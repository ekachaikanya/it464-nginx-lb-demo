# ============================================================
# Nginx — Load Balancer + Reverse Proxy Configuration
# Demo: nginx-lb-demo
# ============================================================

# ── Upstream: กลุ่ม backend servers ──────────────────────────
upstream backend {
    # Algorithm Options:
    #   (ลบ comment เพื่อเปลี่ยน algorithm)
    #
    # least_conn  → ส่งไป server ที่มี active connections น้อยสุด
    # ip_hash     → Client IP เดิม → Server เดิม (session sticky)
    # round_robin → default, วนทีละตัว
    #
    least_conn;

    server app1:5000;   # App Server 1
    server app2:5000;   # App Server 2
    server app3:5000;   # App Server 3

    # Connection pool (ประหยัด overhead TCP handshake)
    keepalive 32;
}

# ── Weighted Load Balancing (uncomment เพื่อทดลอง) ───────────
# upstream backend_weighted {
#     server app1:5000 weight=3;   # รับ 3x traffic
#     server app2:5000 weight=2;   # รับ 2x traffic
#     server app3:5000 weight=1;   # รับ 1x traffic
# }

# ── Server Block ─────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # Access log format
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Main Route → Load Balanced ───────────────────────────
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        # จำเป็นสำหรับ keepalive
        proxy_set_header   Connection "";

        # ส่ง headers ไปยัง backend
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Health Check Endpoint ────────────────────────────────
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Nginx Status (Monitoring) ────────────────────────────
    location /status {
        stub_status on;
        access_log  off;
        # Production: จำกัดเฉพาะ internal IP
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ── Custom Error Pages ───────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error": "Backend unavailable", "status": 503}';
        add_header Content-Type application/json;
    }
}
